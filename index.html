<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ к игре</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Анимация фона */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,150,0.2), transparent 70%);
    animation: glow 6s infinite linear;
}

@keyframes glow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.container {
    position: relative;
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 700px;
    z-index: 1;
}

h1 {
    font-size: 30px;
    margin-bottom: 10px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

.subtitle {
    margin-bottom: 25px;
    opacity: 0.8;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    display: block;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid rgba(255,215,0,0.2);
}

/* неоновая рамка */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(45deg, gold, purple, gold);
    z-index: -1;
    filter: blur(10px);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,215,0,0.5);
}

.card img {
    width: 100%;
    border-radius: 15px;
}

/* кнопка */
.btn {
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    background: linear-gradient(135deg, gold, orange);
    color: black;
    font-weight: bold;
}

/* мобильная версия */
@media (max-width: 600px) {
    .cards {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>🎰 ДОСТУП К ИГРЕ</h1>
    <div class="subtitle">Выберите лучший вариант и получите бонус</div>

    <div class="cards">

        <!-- Карточка 1 -->
        <a href="https://link1.com" class="card">
            <img src="kush.png">
            <div class="btn">ИГРАТЬ</div>
        </a>

        <!-- Карточка 2 -->
        <a href="https://bal-ancer-eva.com/dm8l7ih5r" class="card">
            <img src="eva.jpg">
            <div class="btn">ПОЛУЧИТЬ БОНУС</div>
        </a>

    </div>
</div>

<!-- лёгкая анимация появления -->
<script>
document.body.style.opacity = 0;
window.onload = () => {
    document.body.style.transition = "0.5s";
    document.body.style.opacity = 1;
};
</script>

</body>
</html>
